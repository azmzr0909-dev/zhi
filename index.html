<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solar System Quiz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071126;
      --panel: #101d3a;
      --panel-2: #172a50;
      --accent: #ffd34d;
      --cyan: #60e6ff;
      --coral: #ff7a7a;
      --good: #4fe38c;
      --bad: #ff6b6b;
      --text: #f7fbff;
      --muted: #b9c8e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(96, 230, 255, 0.16), transparent 28%),
        radial-gradient(circle at 85% 16%, rgba(255, 211, 77, 0.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 122, 122, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      padding: 22px;
    }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    header {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .quiz {
      display: grid;
      gap: 14px;
    }

    .question {
      border: 2px solid rgba(96, 230, 255, 0.28);
      background: linear-gradient(180deg, rgba(23, 42, 80, 0.96), rgba(16, 29, 58, 0.96));
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .question h2 {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.3;
    }

    .options {
      display: grid;
      gap: 8px;
    }

    label {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
    }

    input {
      margin-top: 2px;
      accent-color: var(--cyan);
    }

    .feedback {
      min-height: 24px;
      margin: 12px 0 0;
      font-weight: 700;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 7px;
      padding: 12px 18px;
      font-weight: 800;
      color: #081225;
      background: var(--accent);
      cursor: pointer;
      min-width: 142px;
    }

    button.secondary {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .score {
      margin: 16px auto 0;
      width: fit-content;
      max-width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(96, 230, 255, 0.12);
      border: 1px solid rgba(96, 230, 255, 0.32);
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .planet-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }

    .planet {
      width: 18px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 16px color-mix(in srgb, var(--c), transparent 30%);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Solar System Quiz</h1>
      <p class="subtitle">Choose one answer for each question, then check your score.</p>
      <div class="planet-row" aria-hidden="true">
        <span class="planet" style="--c:#ffd34d"></span>
        <span class="planet" style="--c:#b9b1a8"></span>
        <span class="planet" style="--c:#ff9f5f"></span>
        <span class="planet" style="--c:#54a8ff"></span>
        <span class="planet" style="--c:#ff6b6b"></span>
        <span class="planet" style="--c:#d8b27a"></span>
        <span class="planet" style="--c:#8ad6ff"></span>
      </div>
    </header>

    <section class="quiz" id="quiz"></section>

    <div class="actions">
      <button id="check">Check Answers</button>
      <button class="secondary" id="reset">Try Again</button>
    </div>
    <div class="score" id="score" aria-live="polite">Score: 0 / 5</div>
  </main>

  <script>
    const questions = [
      {
        text: "Which object is at the center of our Solar System?",
        options: ["Earth", "The Sun", "The Moon", "Jupiter"],
        answer: 1,
        feedback: "Correct: The Sun is the star at the center of our Solar System."
      },
      {
        text: "Which planet is known as the Red Planet?",
        options: ["Mars", "Venus", "Mercury", "Neptune"],
        answer: 0,
        feedback: "Correct: Mars looks red because of iron oxide, or rust, on its surface."
      },
      {
        text: "Which planet is the largest planet in the Solar System?",
        options: ["Earth", "Saturn", "Jupiter", "Uranus"],
        answer: 2,
        feedback: "Correct: Jupiter is the largest planet in our Solar System."
      },
      {
        text: "What do planets do as they move around the Sun?",
        options: ["They orbit the Sun", "They stop moving at night", "They orbit Earth's Moon", "They turn into stars"],
        answer: 0,
        feedback: "Correct: Planets travel around the Sun in paths called orbits."
      },
      {
        text: "Why is Earth able to support life?",
        options: ["It has liquid water, air, and suitable temperatures", "It is the biggest planet", "It is closest to the Sun", "It has no gravity"],
        answer: 0,
        feedback: "Correct: Earth has liquid water, an atmosphere, and temperatures suitable for life."
      }
    ];

    const quiz = document.querySelector("#quiz");
    const score = document.querySelector("#score");

    function renderQuiz() {
      quiz.innerHTML = questions.map((question, index) => `
        <article class="question">
          <h2>${index + 1}. ${question.text}</h2>
          <div class="options">
            ${question.options.map((option, optionIndex) => `
              <label>
                <input type="radio" name="q${index}" value="${optionIndex}">
                <span>${option}</span>
              </label>
            `).join("")}
          </div>
          <p class="feedback" id="f${index}" aria-live="polite"></p>
        </article>
      `).join("");
      score.textContent = "Score: 0 / 5";
    }

    function checkAnswers() {
      let total = 0;
      questions.forEach((question, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const feedback = document.querySelector(`#f${index}`);
        if (!selected) {
          feedback.className = "feedback bad";
          feedback.textContent = "Please choose an answer.";
          return;
        }
        if (Number(selected.value) === question.answer) {
          total += 1;
          feedback.className = "feedback good";
          feedback.textContent = question.feedback;
        } else {
          feedback.className = "feedback bad";
          feedback.textContent = `Incorrect: The correct answer is "${question.options[question.answer]}".`;
        }
      });
      score.textContent = `Score: ${total} / ${questions.length}`;
    }

    document.querySelector("#check").addEventListener("click", checkAnswers);
    document.querySelector("#reset").addEventListener("click", renderQuiz);
    renderQuiz();
  </script>
</body>
</html>
